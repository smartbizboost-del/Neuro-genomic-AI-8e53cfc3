# infrastructure/kubernetes/secrets.yaml
# NEVER commit this file. Use OCI Vault or External Secrets Operator
apiVersion: v1
kind: Secret
metadata:
  name: neuro-secrets
  namespace: neuro-genomic
type: Opaque
stringData:
  database-url: "postgresql://user:password@host:5432/neuro_genomic"
  redis-url: "redis://redis:6379/0"
  minio-endpoint: "minio:9000"
  minio-access-key: "minioadmin"
  minio-secret-key: "minioadmin"
  jwt-secret: "your-jwt-secret-here"
  api-key: "your-api-key-here"