#cloud-config

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg-agent
  - software-properties-common
  - git

runcmd:
  # Install Docker
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | apt-key add -
  - add-apt-repository "deb [arch=amd64] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable"
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io
  
  # Install Docker Compose V2
  - mkdir -p /usr/local/lib/docker/cli-plugins
  - curl -SL https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-linux-x86_64 -o /usr/local/lib/docker/cli-plugins/docker-compose
  - chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
  
  # Setup the AI platform
  - mkdir /opt/neuro-genomic-ai
  - cd /opt/neuro-genomic-ai
  
  # Important: Instead of pulling from a repo (since yours might be local/private), 
  # creating a placeholder for demonstrating. You will need to SCP your code here.
  # If you have it on github: git clone https://github.com/yourusername/neuro-genomic-ai-main .
  
  # Start the background services via compose
  # - docker compose up -d --build
