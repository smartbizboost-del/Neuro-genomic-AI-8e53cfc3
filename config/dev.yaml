environment: development
debug: true
log_level: debug

database:
  url: postgresql://neuro_user:neuro_pass@postgres:5432/neuro_genomic

redis:
  url: redis://redis:6379/0

minio:
  endpoint: minio:9000
  access_key: minioadmin
  secret_key: minioadmin
  bucket: neuro-genomic-ecg

api:
  host: 0.0.0.0
  port: 8000
  workers: 4

celery:
  concurrency: 4
  max_tasks_per_child: 100

features:
  enable_uncertainty_viz: true
  enable_export_pdf: false
  enable_batch_processing: true